<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>明星三缺一 2002 - KeyGen</title>
<!-- Include 98.css -->
<link rel="stylesheet" href="https://unpkg.com/98.css" />
<style>
  /* Classic Windows 98 background color */
  body {
    background-color: #008080;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  
  .window {
    width: 420px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
  }

  .logo-section {
    text-align: center;
    margin-bottom: 12px;
  }

  .logo-section h2 {
    margin: 0;
    font-size: 22px;
    font-family: 'MS Sans Serif', Tahoma, sans-serif;
  }

  .logo-section p {
    margin: 4px 0 0;
    font-size: 11px;
    color: #555;
  }

  .field-row.centered {
    justify-content: center;
    margin: 8px 0;
  }

  .serial-input {
    font-family: 'Courier New', Courier, monospace !important;
    font-size: 20px !important;
    font-weight: bold;
    text-align: center;
    width: 85%;
    padding: 4px;
    letter-spacing: 4px;
    background-color: #f0f0f0;
  }

  .btn-row {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 12px 0;
  }

  .btn-row button {
    width: 110px;
    padding: 4px;
    font-weight: bold;
  }

  .log-panel {
    height: 80px;
    overflow-y: scroll;
    background-color: #ffffff;
    padding: 2px;
  }

  .log-list {
    margin: 0;
    padding: 2px 4px;
    list-style-type: none;
    font-size: 11px;
    font-family: 'Courier New', Courier, monospace;
  }

  .log-list li {
    margin-bottom: 2px;
  }

  .ok { color: #0000ff; }
  .warn { color: #ff0000; }
  .timestamp { color: #888; }
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">
    <div class="title-bar-text">🔑 明星三缺一 2002 - KeyGen.exe</div>
    <div class="title-bar-controls">
      <button aria-label="Minimize"></button>
      <button aria-label="Maximize"></button>
      <button aria-label="Close"></button>
    </div>
  </div>
  
  <div class="window-body">
    <div class="logo-section">
      <h2>明星三缺一 2002</h2>
      <p>Celebrity Mahjong 3-Missing-1 2002 · IGS / IGSMJ2</p>
    </div>

    <fieldset>
      <legend>Serial Key Generator</legend>
      <div class="field-row centered">
        <input type="text" id="serial-display" class="serial-input" readonly value="INITIALIZING..." />
      </div>
      
      <div class="btn-row">
        <button onclick="generateSerial()">Generate</button>
        <button id="copy-btn" onclick="copySerial()">Copy Key</button>
      </div>
    </fieldset>

    <fieldset>
      <legend>Information</legend>
      <div class="field-row">
        <label>Algorithm:</label>
        <span>CRC32 + BITPERM</span>
      </div>
      <div class="field-row">
        <label>Charset (32):</label>
        <span style="font-family: 'Courier New', monospace; font-size:11px;">123456789ACDEFGHKJLMNPQRSTUVWXYZ</span>
      </div>
    </fieldset>

    <fieldset>
      <legend>Operation Log</legend>
      <div class="sunken-panel log-panel">
        <ul class="log-list" id="log"></ul>
      </div>
    </fieldset>
  </div>

  <div class="status-bar">
    <p class="status-bar-field" id="status" style="flex: 2;">Initializing...</p>
  </div>
</div>

<script>
// ── Full algorithm reversed from igsmj2.exe ──────────────────────────
// Serial validation: 0x41a210 (pack+permute) + 0x41a350 (CRC32 check)
// Valid if: CRC32(permuted[1..4]) & 0xFF == permuted[0]

const CHARSET = "123456789ACDEFGHKJLMNPQRSTUVWXYZ";

// Bit permutation table @ 0x4856c0 (rdata), 40 uint32 entries
const PERM =[7,20,21,22,33,8,3,1,26,35,36,2,15,16,12,13,9,10,4,5,11,14,0,17,18,24,25,27,28,38,23,6,19,31,32,37,39,29,30,34];

// Standard CRC32 table @ 0x4938cc
const CRC_TABLE =[0,1996959894,3993919788,2567524794,124634137,1886057615,3915621685,2657392035,249268274,2044508324,3772115230,2547177864,162941995,2125561021,3887607047,2428444049,498536548,1789927666,4089016648,2227061214,450548861,1843258603,4107580753,2211677639,325883990,1684777152,4251122042,2321926636,335633487,1661365465,4195302755,2366115317,997073096,1281953886,3579855332,2724688242,1006888145,1258607687,3524101629,2768942443,901097722,1119000684,3686517206,2898065728,853044451,1172266101,3705015759,2882616665,651767980,1373503546,3369554304,3218104598,565507253,1454621731,3485111705,3099436303,671266974,1594198024,3322730930,2970347812,795835527,1483230225,3244367275,3060149565,1994146192,31158534,2563907772,4023717930,1907459465,112637215,2680153253,3904427059,2013776290,251722036,2517215374,3775830040,2137656763,141376813,2439277719,3865271297,1802195444,476864866,2238001368,4066508878,1812370925,453092731,2181625025,4111451223,1706088902,314042704,2344532202,4240017532,1658658271,366619977,2362670323,4224994405,1303535960,984961486,2747007092,3569037538,1256170817,1037604311,2765210733,3554079995,1131014506,879679996,2909243462,3663771856,1141124467,855842277,2852801631,3708648649,1342533948,654459306,3188396048,3373015174,1466479909,544179635,3110523913,3462522015,1591671054,702138776,2966460450,3352799412,1504918807,783551873,3082640443,3233442989,3988292384,2596254646,62317068,1957810842,3939845945,2647816111,81470997,1943803523,3814918930,2489596804,225274430,2053790376,3826175755,2466906013,167816743,2097651377,4027552580,2265490386,503444072,1762050814,4150417245,2154129355,426522225,1852507879,4275313526,2312317920,282753626,1742555852,4189708143,2394877945,397917763,1622183637,3604390888,2714866558,953729732,1340076626,3518719985,2797360999,1068828381,1219638859,3624741850,2936675148,906185462,1090812512,3747672003,2825379669,829329135,1181335161,3412177804,3160834842,628085408,1382605366,3423369109,3138078467,570562233,1426400815,3317316542,2998733608,733239954,1555261956,3268935591,3050360625,752459403,1541320221,2607071920,3965973030,1969922972,40735498,2617837225,3943577151,1913087877,83908371,2512341634,3803740692,2075208622,213261112,2463272603,3855990285,2094854071,198958881,2262029012,4057260610,1759359992,534414190,2176718541,4139329115,1873836001,414664567,2282248934,4279200368,1711684554,285281116,2405801727,4167216745,1634467795,376229701,2685067896,3608007406,1308918612,956543938,2808555105,3495958263,1231636301,1047427035,2932959818,3654703836,1088359270,936918000,2847714899,3736837829,1202900863,817233897,3183342108,3401237130,1404277552,615818150,3134207493,3453421203,1423857449,601450431,3009837614,3294710456,1567103746,711928724,3020668471,3272380065,1510334235,755167117];

function getBit(buf, n) { return (buf[n >> 3] >> (n & 7)) & 1; }
function setBit(buf, n, val) { if (val) buf[n >> 3] |= 1 << (n & 7); else buf[n >> 3] &= ~(1 << (n & 7)); }

function packSerial(serial) {
  const bits = new Uint8Array(5);
  for (let i = 0; i < 8; i++) {
    const idx = CHARSET.indexOf(serial[i].toUpperCase());
    const bp = i * 5, byi = bp >> 3, bof = bp & 7;
    bits[byi] |= (idx << bof) & 0xFF;
    if (bof + 5 > 8) bits[byi + 1] |= (idx >> (8 - bof)) & 0xFF;
  }
  return bits;
}

function permuteInv(packed) {
  const out = new Uint8Array(8);
  for (let i = 0; i < 40; i++) setBit(out, PERM[i], getBit(packed, i));
  return out;
}

function crc32Check(out) {
  let crc = 0xFFFFFFFF;
  for (let i = 1; i < 5; i++) crc = ((crc >>> 8) ^ CRC_TABLE[(crc & 0xFF) ^ out[i]]) >>> 0;
  return ((~crc) >>> 0);
}

function isValid(serial) {
  if (serial.length !== 8) return false;
  for (const c of serial) if (CHARSET.indexOf(c.toUpperCase()) < 0) return false;
  const out = permuteInv(packSerial(serial));
  return (crc32Check(out) & 0xFF) === out[0];
}

function generateSerial() {
  const t0 = performance.now();
  for (let attempt = 0; attempt < 50000; attempt++) {
    let base = '';
    for (let i = 0; i < 7; i++) base += CHARSET[Math.random() * 32 | 0];
    for (const c of CHARSET) {
      const s = base + c;
      if (isValid(s)) {
        const ms = (performance.now() - t0).toFixed(1);
        currentSerial = s;
        document.getElementById('serial-display').value = s;
        addLog(`<span class="ok">Generated[${attempt+1} att, ${ms}ms]: ${s}</span>`);
        document.getElementById('status').textContent = 'Ready.';
        return s;
      }
    }
  }
  addLog('<span class="warn">Generation failed.</span>');
}

let currentSerial = '';

function copySerial() {
  if (!currentSerial) { generateSerial(); return; }
  navigator.clipboard.writeText(currentSerial).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    addLog(`<span class="ok">Copied to clipboard: ${currentSerial}</span>`);
    setTimeout(() => { btn.textContent = 'Copy Key'; }, 2000);
  });
}

function addLog(html) {
  const log = document.getElementById('log');
  const li = document.createElement('li');
  const t = new Date().toLocaleTimeString('en-GB', {hour12:false});
  li.innerHTML = `<span class="timestamp">[${t}]</span> ${html}`;
  log.appendChild(li);
  
  // Auto-scroll to bottom
  const logPanel = log.parentElement;
  logPanel.scrollTop = logPanel.scrollHeight;
}

// Initialize UI to READY state
document.getElementById('status').textContent = 'Ready.';
document.getElementById('serial-display').value = 'PRESS GENERATE';
addLog('<span class="ok">System initialized and ready.</span>');
</script>
</body>
</html>
